name: Build OtoKreator APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create gradle wrapper files manually
        run: |
          # Buat folder wrapper
          mkdir -p gradle/wrapper

          # Buat gradle-wrapper.properties
          cat <<EOF > gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.10.0-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # Buat file gradlew
          cat <<'SCRIPT' > gradlew
          #!/bin/sh
          #
          # Gradle start up script for POSIX generated by Gradle.
          #

          # Attempt to set APP_HOME
          PRG="$0"
          while [ -h "$PRG" ]; do
            ls=$(ls -ld "$PRG")
            link=$(expr "$ls" : '.*-> \(.*\)$')
            if expr "$link" : '/.*' > /dev/null; then
              PRG="$link"
            else
              PRG=$(dirname "$PRG")/"$link"
            fi
          done
          SAVED="$(pwd)"
          cd "$(dirname "$PRG")/" || exit 1
          APP_HOME="$(pwd -P)"
          cd "$SAVED" || exit 1

          APP_NAME="Gradle"
          APP_BASE_NAME=$(basename "$0")

          # Use the maximum available, or set MAX_FD != -1 to use that value.
          MAX_FD="maximum"

          warn () {
            echo "$*"
          }

          die () {
            echo
            echo "$*"
            echo
            exit 1
          }

          # OS specific support
          darwin=false
          case "$(uname)" in
            Darwin* )
              darwin=true
              ;;
          esac

          # Determine the Java command to use to start the JVM.
          if [ -n "$JAVA_HOME" ] ; then
            if [ -x "$JAVA_HOME/jre/sh/java" ] ; then
              JAVACMD="$JAVA_HOME/jre/sh/java"
            else
              JAVACMD="$JAVA_HOME/bin/java"
            fi
            if [ ! -x "$JAVACMD" ] ; then
              die "ERROR: JAVA_HOME is set to an invalid directory: $JAVA_HOME"
            fi
          else
            JAVACMD="java"
            which java >/dev/null 2>&1 || die "ERROR: JAVA_HOME is not set and no 'java' command could be found in your PATH."
          fi

          # Increase the maximum file descriptors if we can.
          if [ "$cygwin" = "false" -a "$darwin" = "false" -a "$nonstop" = "false" ] ; then
            MAX_FD_LIMIT=$(ulimit -H -n)
            if [ $? -eq 0 ] ; then
              if [ "$MAX_FD" = "maximum" -o "$MAX_FD" = "max" ] ; then
                MAX_FD="$MAX_FD_LIMIT"
              fi
              ulimit -n $MAX_FD
              if [ $? -ne 0 ] ; then
                warn "Could not set maximum file descriptor limit: $MAX_FD"
              fi
            else
              warn "Could not query maximum file descriptor limit: $MAX_FD_LIMIT"
            fi
          fi

          # For Darwin, add options to specify how the application appears in the dock
          if $darwin; then
            GRADLE_OPTS="$GRADLE_OPTS \"-Xdock:name=$APP_NAME\" \"-Xdock:icon=$APP_HOME/media/gradle.icns\""
          fi

          # For Cygwin or MSYS, switch paths to Windows format before running java
          if [ "$cygwin" = "true" -o "$msys" = "true" ] ; then
            APP_HOME=$(cygpath --path --mixed "$APP_HOME")
          fi

          CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar

          # Determine the Java command to use to start the JVM.
          if [ -n "$JAVA_HOME" ] ; then
            if [ -x "$JAVA_HOME/jre/sh/java" ] ; then
              JAVACMD="$JAVA_HOME/jre/sh/java"
            else
              JAVACMD="$JAVA_HOME/bin/java"
            fi
          else
            JAVACMD="java"
          fi

          exec "$JAVACMD" \
            $GRADLE_OPTS \
            -classpath "$CLASSPATH" \
            org.gradle.wrapper.GradleWrapperMain \
            "$@"
          SCRIPT

          # Download gradle-wrapper.jar
          curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.10.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Create .env file
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      - name: Create dummy debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass android -keypass android \
          -dname "CN=Android Debug,O=Android,C=US" || true

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK (Debug)
        uses: actions/upload-artifact@v4
        with:
          name: OtoKreator-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      # Opsional: Buat debug.keystore kosong agar build debug bisa jalan
      - name: Create dummy debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass android -keypass android \
          -dname "CN=Android Debug,O=Android,C=US" || true

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK (Debug)
        uses: actions/upload-artifact@v4
        with:
          name: OtoKreator-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
