name: Build OtoKreator APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1'   # sesuai permintaan AGP 9.1.1

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 9.3.1

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Create .env file
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      - name: Create dummy debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass android -keypass android \
          -dname "CN=Android Debug,O=Android,C=US" || true
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK (Debug)
        uses: actions/upload-artifact@v4
        with:
          name: OtoKreator-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
