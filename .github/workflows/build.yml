name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Mengambil kode sumber
      uses: actions/checkout@v3

    - name: Menyiapkan Java (JDK 17)
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Membuat kunci (debug.keystore) yang dilupakan AI
      run: keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"

    - name: Merakit Aplikasi (Build APK)
      run: gradle assembleDebug

    - name: Menyimpan Hasil APK
      uses: actions/upload-artifact@v4
      with:
        name: Aplikasi-AI-Content
        path: '**/*.apk'
