name: Build OtoKreator APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Biar bisa build manual dari tab Actions

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 36
          build-tools: '36.0.0'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Inject GEMINI_API_KEY dari GitHub Secrets ke file .env
      - name: Create .env file
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      # Opsional: Buat debug.keystore kosong agar build debug bisa jalan
      - name: Create dummy debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass android -keypass android \
          -dname "CN=Android Debug,O=Android,C=US" || true

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK (Debug)
        uses: actions/upload-artifact@v4
        with:
          name: OtoKreator-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7