name: Build OtoKreator APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create gradle wrapper files manually
        run: |
          mkdir -p gradle/wrapper

          # Tulis gradle-wrapper.properties dengan satu baris echo untuk menghindari spasi
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.10.0-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "networkTimeout=10000" >> gradle/wrapper/gradle-wrapper.properties
          echo "validateDistributionUrl=true" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties

          # Buat file gradlew (script sama seperti sebelumnya, tapi lebih pendek dengan echo)
          cat <<'SCRIPT' > gradlew
          #!/bin/sh
          PRG="$0"
          while [ -h "$PRG" ]; do
            ls=`ls -ld "$PRG"`
            link=`expr "$ls" : '.*-> \(.*\)$'`
            if expr "$link" : '/.*' > /dev/null; then
              PRG="$link"
            else
              PRG=`dirname "$PRG"`/"$link"
            fi
          done
          SAVED="`pwd`"
          cd "`dirname \"$PRG\"`/" || exit
          APP_HOME="`pwd -P`"
          cd "$SAVED" || exit

          # Use the maximum available, or set MAX_FD != -1 to use that value.
          MAX_FD="maximum"

          warn () { echo "$*"; }
          die () { echo; echo "$*"; echo; exit 1; }

          # OS specific support
          darwin=false
          case "`uname`" in
            Darwin* ) darwin=true ;;
          esac

          # Determine the Java command to use to start the JVM.
          if [ -n "$JAVA_HOME" ] ; then
            if [ -x "$JAVA_HOME/jre/sh/java" ] ; then
              JAVACMD="$JAVA_HOME/jre/sh/java"
            else
              JAVACMD="$JAVA_HOME/bin/java"
            fi
            if [ ! -x "$JAVACMD" ] ; then
              die "ERROR: JAVA_HOME is set to an invalid directory: $JAVA_HOME"
            fi
          else
            JAVACMD="java"
            which java >/dev/null 2>&1 || die "ERROR: JAVA_HOME is not set and no 'java' command could be found in your PATH."
          fi

          CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar

          exec "$JAVACMD" \
            -classpath "$CLASSPATH" \
            org.gradle.wrapper.GradleWrapperMain \
            "$@"
          SCRIPT

          # Download gradle-wrapper.jar dari repo Gradle resmi
          curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.10.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Create .env file
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      - name: Create dummy debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass android -keypass android \
          -dname "CN=Android Debug,O=Android,C=US" || true

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK (Debug)
        uses: actions/upload-artifact@v4
        with:
          name: OtoKreator-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7